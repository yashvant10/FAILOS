{% extends 'base.html' %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel slide-in" style="width: 100%; max-width: 400px; text-align: center; border-color: var(--success); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);">
        <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: var(--success); margin-bottom: 1.5rem;"></i>
        <h2>Payment Successful!</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Your account has been upgraded to Standard.</p>
        
        <a href="{% url 'dashboard' %}" class="btn btn-primary" style="width: 100%;">Return to Dashboard</a>
    </div>
</div>
{% endblock %}
