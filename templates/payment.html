{% extends 'base.html' %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel slide-in" style="width: 100%; max-width: 500px;">
        <h2 style="text-align: center; margin-bottom: 2rem;"><i class="fa-solid fa-credit-card"></i> Upgrade Plan</h2>
        
        <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Selected Plan</p>
            <h3 style="display: flex; justify-content: space-between;">Standard Plan <span>$9.00</span></h3>
        </div>

        <h4 style="margin-bottom: 1rem;">Select Payment Method</h4>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="#" class="btn btn-outline" style="text-align: left; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
                <i class="fa-brands fa-cc-stripe" style="font-size: 1.5rem; color: #6366f1;"></i> Pay with Credit Card (Stripe)
            </a>
            <a href="{% url 'paytm_payment' %}" class="btn btn-outline" style="text-align: left; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
                <i class="fa-solid fa-building-columns" style="font-size: 1.5rem; color: #00b9f5;"></i> Pay with Paytm
            </a>
        </div>
        
        <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 2rem;">
            Secure 256-bit SSL encryption.
        </p>
    </div>
</div>
{% endblock %}
