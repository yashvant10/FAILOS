{% extends 'base.html' %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-panel slide-in" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2><i class="fa-solid fa-key" style="color: var(--warning);"></i> Reset Password</h2>
            <p style="color: var(--text-secondary);">Enter your email and we'll send you a link to reset your password</p>
        </div>
        
        <form>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" required>
            </div>
            
            <button type="button" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">
                Send Reset Link
            </button>
            
            <p style="text-align: center; font-size: 0.9rem;">
                Remembered your password? <a href="{% url 'login' %}">Log in</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
