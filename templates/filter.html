{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="glass-panel slide-in" style="max-width: 600px; margin: 0 auto;">
        <h2><i class="fa-solid fa-filter"></i> Advanced Filters</h2>
        <form style="margin-top: 1.5rem;">
            <div class="form-group">
                <label class="form-label">Risk Level</label>
                <select class="form-control">
                    <option>Any Risk</option>
                    <option>High Risk</option>
                    <option>Medium Risk</option>
                    <option>Low Risk</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Industry Sector</label>
                <input type="text" class="form-control" placeholder="e.g., E-commerce, SaaS, Hardware">
            </div>
            
            <button type="button" class="btn btn-primary" style="width: 100%;">Apply Filters</button>
        </form>
    </div>
</div>
{% endblock %}
