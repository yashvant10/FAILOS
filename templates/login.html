{% extends 'base.html' %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel slide-in" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary);">Log in to access your dashboard</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between;">
                    <label class="form-label">Password</label>
                    <a href="{% url 'forgot_password' %}" style="font-size: 0.85rem;">Forgot?</a>
                </div>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary pulse-hover" style="width: 100%; margin-bottom: 1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
            
            <button type="button" class="btn btn-outline" style="width: 100%; margin-bottom: 1.5rem;">
                <i class="fa-brands fa-google" style="color: #ea4335;"></i> Sign in with Google
            </button>
            
            <p style="text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
