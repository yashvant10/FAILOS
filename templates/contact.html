{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="glass-panel slide-in" style="max-width: 600px; margin: 2rem auto;">
        <h2><i class="fa-regular fa-envelope"></i> Contact Us</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">We'd love to hear your feedback or answer any questions you have about the platform.</p>
        
        <form>
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="button" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
